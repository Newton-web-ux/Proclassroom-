<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Classroom Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --ink:#1F3A2E;
    --ink-2:#16281F;
    --parchment:#F6F1E4;
    --paper:#FFFDF7;
    --ochre:#C68E17;
    --ochre-2:#E4A62B;
    --red-pen:#A6373B;
    --chalk:#F1EDE0;
    --line: rgba(31,58,46,0.14);
    --line-strong: rgba(31,58,46,0.28);
    --shadow: 0 1px 2px rgba(31,58,46,.06), 0 6px 20px rgba(31,58,46,.08);
    --radius: 10px;
    --sidebar-w: 260px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--parchment);
    color:var(--ink-2);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces',serif;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  button{ font-family:inherit; cursor:pointer; }
  a{ color:inherit; text-decoration:none; }

  /* ---------- Layout ---------- */
  #app{ display:flex; min-height:100vh; }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:var(--sidebar-w);
    flex-shrink:0;
    background:var(--ink);
    color:var(--chalk);
    display:flex;
    flex-direction:column;
    padding:22px 0 16px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 20px 20px;
    border-bottom:1px solid rgba(241,237,224,.14);
    margin-bottom:14px;
  }
  .brand .mark{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(155deg, var(--ochre-2), var(--ochre));
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; color:var(--ink-2); font-size:18px;
    flex-shrink:0;
  }
  .brand .name{ font-family:'Fraunces',serif; font-size:19px; font-weight:600; line-height:1.1;}
  .brand .tag{ font-size:11px; color:rgba(241,237,224,.55); margin-top:2px; letter-spacing:.03em; text-transform:uppercase;}

  .nav-section{ padding:4px 12px; }
  .nav-label{
    font-size:10.5px; text-transform:uppercase; letter-spacing:.09em;
    color:rgba(241,237,224,.45); padding:14px 10px 6px;
  }
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding:9px 10px; border-radius:7px; margin:1px 0;
    color:rgba(241,237,224,.85); font-size:14px; font-weight:500;
    border:none; background:transparent; width:100%; text-align:left;
    transition:background .12s;
  }
  .nav-item:hover{ background:rgba(241,237,224,.08); }
  .nav-item.active{ background:rgba(241,237,224,.14); color:#fff; }
  .nav-item .ic{ width:17px; text-align:center; opacity:.9; font-size:14px; }
  .nav-item .count{
    margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:11px;
    background:rgba(241,237,224,.14); padding:1px 6px; border-radius:20px;
  }

  .class-tab{
    display:flex; align-items:center; gap:9px;
    padding:8px 10px 8px 8px; border-radius:0 7px 7px 0; margin:2px 0 2px 0;
    border-left:3px solid transparent;
    color:rgba(241,237,224,.85); font-size:13.5px; font-weight:500;
    background:transparent; width:100%; text-align:left; border-top:none;border-right:none;border-bottom:none;
    position:relative;
  }
  .class-tab .swatch{ width:9px;height:9px;border-radius:2px; flex-shrink:0; }
  .class-tab:hover{ background:rgba(241,237,224,.07); }
  .class-tab.active{ background:rgba(241,237,224,.14); border-left-color:var(--ochre-2); color:#fff; }
  .class-tab .ct-name{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .sidebar-foot{ margin-top:auto; padding:14px 20px 4px; }
  .new-class-btn{
    width:100%; padding:9px 10px; border-radius:7px; border:1px dashed rgba(241,237,224,.35);
    background:transparent; color:rgba(241,237,224,.75); font-size:13px; font-weight:500;
  }
  .new-class-btn:hover{ background:rgba(241,237,224,.08); color:#fff; }

  /* ---------- Main ---------- */
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar{
    display:flex; align-items:center; gap:16px;
    padding:14px 28px; background:var(--paper);
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:5;
  }
  .search{
    flex:1; max-width:420px;
    display:flex; align-items:center; gap:8px;
    background:var(--parchment); border:1px solid var(--line);
    border-radius:8px; padding:8px 12px; font-size:13.5px; color:#5b6b60;
  }
  .search input{ border:none; background:transparent; outline:none; font-size:13.5px; width:100%; font-family:inherit; color:var(--ink-2);}
  .topbar-actions{ margin-left:auto; display:flex; align-items:center; gap:12px; }
  .btn{
    padding:9px 15px; border-radius:7px; border:1px solid transparent;
    font-size:13.5px; font-weight:600; display:inline-flex; align-items:center; gap:7px;
  }
  .btn-primary{ background:var(--ink); color:var(--chalk); }
  .btn-primary:hover{ background:var(--ink-2); }
  .btn-ghost{ background:transparent; border-color:var(--line-strong); color:var(--ink-2); }
  .btn-ghost:hover{ background:var(--parchment); }
  .avatar{
    width:34px;height:34px;border-radius:50%;
    background:var(--ochre); color:#fff; font-weight:700; font-size:13px;
    display:flex;align-items:center;justify-content:center; font-family:'Fraunces',serif;
    flex-shrink:0;
  }
  .sync-indicator{
    font-size:11.5px; font-weight:600; color:#8b978e; white-space:nowrap;
  }
  .sync-indicator.sync-saving{ color:var(--ochre); }
  .sync-indicator.sync-saved{ color:#2A6B3E; }
  .sync-indicator.sync-error{ color:var(--red-pen); }

  .content{ padding:28px 34px 60px; max-width:1180px; width:100%; margin:0 auto; }

  /* ---------- Dashboard ---------- */
  .page-head{ margin-bottom:22px; }
  .page-head .eyebrow{ font-size:11.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--ochre); font-weight:700; margin-bottom:4px;}
  .page-head h1{ font-size:28px; margin:0; color:var(--ink); }
  .page-head p{ margin:6px 0 0; color:#5b6b60; font-size:14px; }

  .stat-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:26px; }
  .stat-card{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 18px; box-shadow:var(--shadow);
    position:relative; overflow:hidden;
  }
  .stat-card::before{
    content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--stat-color, var(--ochre));
  }
  .stat-card .label{ font-size:12px; color:#5b6b60; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  .stat-card .value{ font-family:'Fraunces',serif; font-size:30px; font-weight:600; color:var(--ink); margin-top:6px; }
  .stat-card .sub{ font-size:12px; color:#7b8a80; margin-top:3px; }

  .dash-grid{ display:grid; grid-template-columns:1.5fr 1fr; gap:20px; align-items:start; }
  .panel{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden;
  }
  .panel-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:15px 18px; border-bottom:1px solid var(--line);
  }
  .panel-head h3{ font-size:15.5px; margin:0; color:var(--ink); }
  .panel-body{ padding:6px 0; }
  .panel-body.pad{ padding:16px 18px; }

  .ledger-row{
    display:flex; align-items:center; gap:12px;
    padding:11px 18px; border-bottom:1px solid var(--line);
  }
  .ledger-row:last-child{ border-bottom:none; }
  .ledger-row:hover{ background:rgba(198,142,23,.05); }
  .due-chip{
    width:38px;height:38px;border-radius:8px; flex-shrink:0;
    background:var(--parchment); border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; line-height:1;
  }
  .due-chip .d{ font-size:13px; font-weight:600; color:var(--ink); }
  .due-chip .m{ font-size:8.5px; color:#7b8a80; text-transform:uppercase; }
  .ledger-row .r-title{ font-size:13.5px; font-weight:600; color:var(--ink-2); }
  .ledger-row .r-sub{ font-size:12px; color:#7b8a80; margin-top:2px; }
  .ledger-row .r-right{ margin-left:auto; text-align:right; }
  .pill{
    font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:20px;
    text-transform:uppercase; letter-spacing:.03em;
  }
  .pill-warn{ background:#FBEBD9; color:#95610A; }
  .pill-ok{ background:#E1EEE3; color:#2A6B3E; }
  .pill-late{ background:#F6DEDF; color:var(--red-pen); }

  .activity-item{ display:flex; gap:11px; padding:11px 18px; border-bottom:1px solid var(--line); }
  .activity-item:last-child{ border-bottom:none; }
  .activity-dot{ width:8px;height:8px;border-radius:50%; background:var(--ochre); margin-top:6px; flex-shrink:0;}
  .activity-item .a-text{ font-size:13px; color:var(--ink-2); line-height:1.45; }
  .activity-item .a-text b{ font-weight:600; }
  .activity-item .a-time{ font-size:11px; color:#8b978e; margin-top:2px; }

  .chart-wrap{ padding:16px 18px 8px; }
  .bar-row{ display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .bar-label{ width:64px; font-size:11.5px; color:#5b6b60; flex-shrink:0; font-family:'IBM Plex Mono',monospace;}
  .bar-track{ flex:1; height:9px; background:var(--parchment); border-radius:6px; overflow:hidden; }
  .bar-fill{ height:100%; background:linear-gradient(90deg, var(--ochre), var(--ochre-2)); border-radius:6px; }
  .bar-val{ width:32px; text-align:right; font-size:11.5px; font-weight:600; color:var(--ink); font-family:'IBM Plex Mono',monospace;}

  /* ---------- Class tabs (in class view) ---------- */
  .class-banner{
    border-radius:var(--radius); padding:26px 26px; margin-bottom:0;
    background: linear-gradient(135deg, var(--banner-color-1,#2C4A3B), var(--banner-color-2,#1F3A2E));
    color:#fff; position:relative; overflow:hidden;
  }
  .class-banner::after{
    content:''; position:absolute; right:-40px; bottom:-60px; width:220px;height:220px;
    border:1px solid rgba(255,255,255,.12); border-radius:50%;
  }
  .class-banner .cb-sub{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; opacity:.75; font-weight:600;}
  .class-banner h1{ font-size:30px; margin:6px 0 4px; color:#fff; }
  .class-banner .cb-meta{ font-size:13px; opacity:.85; }

  .tab-strip{
    display:flex; gap:4px; margin:18px 0 20px; border-bottom:1px solid var(--line-strong);
  }
  .tab-btn{
    padding:10px 16px; border:none; background:transparent; font-size:13.5px; font-weight:600;
    color:#7b8a80; border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .tab-btn.active{ color:var(--ink); border-bottom-color:var(--ochre); }
  .tab-btn:hover{ color:var(--ink); }

  .stream-compose{
    display:flex; gap:12px; align-items:center; padding:14px 18px; background:var(--paper);
    border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px;
  }
  .stream-compose input{
    flex:1; border:none; background:var(--parchment); border-radius:8px; padding:10px 12px;
    font-size:13.5px; outline:none; font-family:inherit;
  }
  .stream-item{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius);
    padding:15px 18px; margin-bottom:12px; box-shadow:var(--shadow);
  }
  .stream-item .si-head{ display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .stream-item .si-name{ font-size:13.5px; font-weight:700; color:var(--ink); }
  .stream-item .si-time{ font-size:11.5px; color:#8b978e; }
  .stream-item .si-body{ font-size:13.5px; color:var(--ink-2); line-height:1.55; }

  .card-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:14px; }
  .work-card{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 17px; box-shadow:var(--shadow); position:relative;
  }
  .work-card .wc-icon{
    width:36px;height:36px;border-radius:8px; background:var(--parchment);
    display:flex;align-items:center;justify-content:center; font-size:16px; margin-bottom:10px;
  }
  .work-card h4{ margin:0 0 4px; font-size:14.5px; font-family:'Fraunces',serif; color:var(--ink); }
  .work-card .wc-meta{ font-size:12px; color:#7b8a80; }
  .work-card .wc-foot{ display:flex; align-items:center; justify-content:space-between; margin-top:12px; }

  table.roster{ width:100%; border-collapse:collapse; }
  table.roster th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em;
    color:#7b8a80; padding:10px 14px; border-bottom:1px solid var(--line-strong); font-weight:700;
  }
  table.roster td{ padding:11px 14px; border-bottom:1px solid var(--line); font-size:13.5px; vertical-align:middle;}
  table.roster tr:last-child td{ border-bottom:none; }
  .stud-name{ display:flex; align-items:center; gap:10px; font-weight:600; color:var(--ink-2); }
  .mini-avatar{
    width:28px;height:28px;border-radius:50%; background:var(--ink); color:#fff;
    display:flex;align-items:center;justify-content:center; font-size:11px; font-weight:700; font-family:'Fraunces',serif;
    flex-shrink:0;
  }

  .gradebook-wrap{ overflow-x:auto; background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
  table.gradebook{ border-collapse:collapse; width:100%; min-width:640px; }
  table.gradebook th{
    font-size:11px; text-transform:uppercase; color:#7b8a80; padding:10px 12px;
    border-bottom:1px solid var(--line-strong); text-align:left; white-space:nowrap; font-weight:700;
  }
  table.gradebook td{ padding:8px 12px; border-bottom:1px solid var(--line); white-space:nowrap; }
  table.gradebook input.grade-input{
    width:52px; text-align:center; border:1px solid var(--line); border-radius:6px; padding:5px 4px;
    font-family:'IBM Plex Mono',monospace; font-size:12.5px; background:var(--parchment);
  }
  table.gradebook input.grade-input:focus{ outline:2px solid var(--ochre-2); border-color:transparent; }
  .avg-cell{ font-family:'IBM Plex Mono',monospace; font-weight:700; color:var(--ink); }

  /* ---------- Calendar ---------- */
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
  .cal-dow{ font-size:11px; text-transform:uppercase; color:#7b8a80; text-align:center; font-weight:700; padding-bottom:4px; }
  .cal-cell{
    min-height:92px; background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:7px;
  }
  .cal-cell.empty{ background:transparent; border-color:transparent; }
  .cal-cell .cd-num{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#8b978e; }
  .cal-cell.today .cd-num{ color:#fff; background:var(--ink); width:20px;height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .cal-ev{
    margin-top:5px; font-size:10.5px; padding:2px 6px; border-radius:5px; font-weight:600;
    background:var(--parchment); color:var(--ink-2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    border-left:3px solid var(--ochre);
  }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(22,40,31,.45); display:none;
    align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .overlay.show{ display:flex; }
  .modal{
    background:var(--paper); border-radius:14px; width:100%; max-width:460px;
    box-shadow:0 20px 60px rgba(0,0,0,.25); overflow:hidden;
  }
  .modal-head{ padding:18px 22px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;}
  .modal-head h3{ margin:0; font-size:17px; color:var(--ink); }
  .modal-close{ border:none; background:transparent; font-size:18px; color:#8b978e; }
  .modal-body{ padding:20px 22px; display:flex; flex-direction:column; gap:13px; }
  .field label{ display:block; font-size:12px; font-weight:700; color:#5b6b60; margin-bottom:5px; text-transform:uppercase; letter-spacing:.03em;}
  .field input, .field select, .field textarea{
    width:100%; border:1px solid var(--line-strong); border-radius:8px; padding:10px 11px;
    font-size:13.5px; font-family:inherit; outline:none; background:var(--parchment);
  }
  .field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--ochre); background:var(--paper); }
  .field textarea{ resize:vertical; min-height:70px; }
  .row-2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .swatch-pick{ display:flex; gap:8px; }
  .swatch-opt{ width:26px;height:26px;border-radius:50%; border:2px solid transparent; cursor:pointer; }
  .swatch-opt.sel{ border-color:var(--ink); }
  .modal-foot{ padding:16px 22px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px; }

  .empty-state{ text-align:center; padding:50px 20px; color:#7b8a80; }
  .empty-state .es-icon{ font-size:32px; margin-bottom:10px; }
  .empty-state h4{ margin:0 0 6px; color:var(--ink); font-family:'Fraunces',serif; }

  @media (max-width:980px){
    .stat-grid{ grid-template-columns:repeat(2,1fr); }
    .dash-grid{ grid-template-columns:1fr; }
  }
  @media (max-width:760px){
    .sidebar{ position:fixed; left:-280px; z-index:40; transition:left .2s; }
    .sidebar.open{ left:0; }
    .stat-grid{ grid-template-columns:1fr 1fr; }
    .content{ padding:20px 16px 50px; }
    .row-2{ grid-template-columns:1fr; }
  }

  /* ---------- Login screen ---------- */
  #loginScreen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(198,142,23,.14), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(31,58,46,.10), transparent 45%),
      var(--parchment);
    padding:24px;
  }
  .login-card{
    background:var(--paper); border:1px solid var(--line); border-radius:16px;
    box-shadow:0 20px 60px rgba(31,58,46,.12);
    width:100%; max-width:400px; padding:40px 34px 34px; text-align:center;
  }
  .login-card .mark{
    width:52px;height:52px;border-radius:12px; margin:0 auto 18px;
    background:linear-gradient(155deg, var(--ochre-2), var(--ochre));
    display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; color:var(--ink-2); font-size:26px;
  }
  .login-card h1{ font-size:24px; margin:0 0 6px; color:var(--ink); }
  .login-card p{ font-size:13.5px; color:#5b6b60; margin:0 0 26px; line-height:1.5; }
  .login-card .divider{ height:1px; background:var(--line); margin:24px 0 20px; }
  .login-card .fineprint{ font-size:11.5px; color:#8b978e; margin-top:20px; line-height:1.5; }
  #googleBtn{ display:flex; justify-content:center; min-height:44px; }
  .login-hidden{ display:none !important; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="mark">L</div>
    <h1>Welcome to Ledger</h1>
    <p>Sign in with your Google account to open your classroom dashboard.</p>
    <div id="googleBtn"></div>
    <div id="loginError" style="display:none; color:var(--red-pen); font-size:12.5px; margin-top:14px;"></div>
    <div class="fineprint">Your classes, assignments, and grades are saved to your own row in a Google Sheet, keyed to your Google account email.</div>
  </div>
</div>

<div id="app" class="login-hidden"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* =========================================================
   LEDGER — Classroom Dashboard
   Vanilla JS, single-file app. In-memory data store (no
   browser storage APIs are used per environment constraints).
========================================================= */

/* ---------------- Auth config ---------------- */
const GOOGLE_CLIENT_ID = '384904424093-j1a6kupjerhjufurpvur4hbik6k90bla.apps.googleusercontent.com';

/* ---------------- Cloud storage config ----------------
   Paste the /exec URL of your deployed Google Apps Script
   web app below (see Code.gs). Data is stored in a Google
   Sheet, one row per signed-in user's email. */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzz4RA0IUvYgLHlvDDzni_GDgR6ew0fzbvj9j4ZZesaFAjTU0QF5mZD8KqvcVQ0jMC1/exec';

function isCloudConfigured(){
  return !!APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf('PASTE_YOUR') === -1;
}

/* ---------------- Cloud sync (Google Apps Script + Sheets) ---------------- */
async function loadFromCloud(email){
  try{
    const res = await fetch(`${APPS_SCRIPT_URL}?action=load&email=${encodeURIComponent(email)}`);
    const json = await res.json();
    if(json.status === 'ok'){
      const classes = (json.data && Array.isArray(json.data.classes)) ? json.data.classes : [];
      return { ok:true, classes };
    }
    return { ok:false };
  }catch(err){
    console.error('Cloud load failed', err);
    return { ok:false };
  }
}

let saveTimer = null;
function scheduleSave(){
  if(!isCloudConfigured() || !state.user) return;
  state.syncStatus = 'saving';
  updateSyncIndicator();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToCloud, 700);
}

async function saveToCloud(){
  if(!state.user || !isCloudConfigured()) return;
  try{
    // text/plain avoids a CORS preflight, which Apps Script web apps don't handle.
    await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({ email: state.user.email, data: { classes: db.classes } })
    });
    state.syncStatus = 'saved';
  }catch(err){
    console.error('Cloud save failed', err);
    state.syncStatus = 'error';
  }
  updateSyncIndicator();
}

function syncLabel(){
  if(!isCloudConfigured()) return { text:'Cloud sync not configured', cls:'sync-error' };
  const map = {
    idle:    { text:'', cls:'' },
    loading: { text:'Loading your data…', cls:'sync-saving' },
    saving:  { text:'Saving…', cls:'sync-saving' },
    saved:   { text:'Synced', cls:'sync-saved' },
    error:   { text:'Sync error — check connection', cls:'sync-error' },
  };
  return map[state.syncStatus] || map.idle;
}

function updateSyncIndicator(){
  const el = document.getElementById('syncIndicator');
  if(!el) return;
  const m = syncLabel();
  el.textContent = m.text;
  el.className = 'sync-indicator ' + m.cls;
}

/* ---------------- Google Sign-In ---------------- */
function decodeJwt(token){
  try{
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g,'+').replace(/_/g,'/');
    const json = decodeURIComponent(atob(base64).split('').map(c=>
      '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
    return JSON.parse(json);
  }catch(e){
    console.error('Failed to decode credential', e);
    return null;
  }
}

async function handleCredentialResponse(response){
  const payload = decodeJwt(response.credential);
  if(!payload){
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    err.textContent = 'Sign-in failed — please try again.';
    return;
  }
  state.user = {
    name: payload.name || payload.email,
    email: payload.email,
    picture: payload.picture || ''
  };
  document.getElementById('loginScreen').classList.add('login-hidden');
  document.getElementById('app').classList.remove('login-hidden');

  state.syncStatus = isCloudConfigured() ? 'loading' : 'idle';
  render();

  if(isCloudConfigured()){
    const result = await loadFromCloud(state.user.email);
    if(result.ok){
      db.classes = result.classes;
      state.syncStatus = 'saved';
    }else{
      state.syncStatus = 'error';
    }
    render();
  }
}

function initGoogleAuth(){
  if(typeof google === 'undefined' || !google.accounts){
    // Google Identity script hasn't loaded yet (e.g. blocked network) — retry briefly.
    setTimeout(initGoogleAuth, 300);
    return;
  }
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleCredentialResponse,
    auto_select: false
  });
  google.accounts.id.renderButton(document.getElementById('googleBtn'), {
    theme:'outline', size:'large', width:280, shape:'pill', text:'signin_with'
  });
  google.accounts.id.prompt();
}

function signOut(){
  if(typeof google !== 'undefined' && google.accounts){
    google.accounts.id.disableAutoSelect();
  }
  state.user = null;
  state.view = 'dashboard';
  state.activeClassId = null;
  state.syncStatus = 'idle';
  db.classes = [];
  document.getElementById('app').classList.add('login-hidden');
  document.getElementById('loginScreen').classList.remove('login-hidden');
}

/* ---------------- Helpers ---------------- */
function getClass(id){ return db.classes.find(c=>c.id===id); }
function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return { day:d.getDate(), mon:d.toLocaleString('en',{month:'short'}) };
}
function daysUntil(iso){
  const today = new Date(state.todayISO+'T00:00:00');
  const d = new Date(iso+'T00:00:00');
  return Math.round((d-today)/86400000);
}
function statusPill(iso){
  const diff = daysUntil(iso);
  if(diff < 0) return {cls:'pill-late', text:'Late'};
  if(diff <= 1) return {cls:'pill-warn', text: diff===0? 'Due today':'Due tomorrow'};
  return {cls:'pill-ok', text: diff+' days left'};
}
function initials(name){
  if(!name) return '?';
  return name.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase();
}
function firstName(name){
  if(!name) return 'there';
  return name.split(' ')[0];
}
function allAssignmentsFlat(){
  const out=[];
  db.classes.forEach(c=> c.assignments.forEach(a=> out.push({...a, className:c.name, color:c.color, classId:c.id})));
  return out.sort((a,b)=> a.due.localeCompare(b.due));
}
function classAverage(cls){
  let sum=0,count=0;
  cls.students.forEach(st=>{
    const g = cls.grades[st.id] || {};
    let earned=0, poss=0;
    cls.assignments.forEach(a=>{ if(g[a.id]!=null){ earned+=Number(g[a.id]); poss+=a.points; } });
    if(poss>0){ sum += (earned/poss)*100; count++; }
  });
  return count? Math.round(sum/count) : null;
}
function overallStats(){
  const totalStudents = new Set(db.classes.flatMap(c=>c.students.map(s=>s.id))).size;
  const totalAssignments = db.classes.reduce((n,c)=>n+c.assignments.length,0);
  const dueSoon = allAssignmentsFlat().filter(a=> daysUntil(a.due) >=0 && daysUntil(a.due) <=3).length;
  const avgs = db.classes.map(classAverage).filter(v=>v!=null);
  const overallAvg = avgs.length? Math.round(avgs.reduce((a,b)=>a+b,0)/avgs.length) : 0;
  return { totalStudents, totalAssignments, dueSoon, overallAvg, totalClasses: db.classes.length };
}
function gradeDistribution(){
  const buckets = {'A (90-100)':0,'B (80-89)':0,'C (70-79)':0,'D (60-69)':0,'F (<60)':0};
  db.classes.forEach(cls=>{
    cls.students.forEach(st=>{
      const g = cls.grades[st.id] || {};
      let earned=0, poss=0;
      cls.assignments.forEach(a=>{ if(g[a.id]!=null){ earned+=Number(g[a.id]); poss+=a.points; } });
      if(poss===0) return;
      const pct = (earned/poss)*100;
      if(pct>=90) buckets['A (90-100)']++;
      else if(pct>=80) buckets['B (80-89)']++;
      else if(pct>=70) buckets['C (70-79)']++;
      else if(pct>=60) buckets['D (60-69)']++;
      else buckets['F (<60)']++;
    });
  });
  return buckets;
}

function renderCalendar(){
  const today = new Date(state.todayISO+'T00:00:00');
  const year = today.getFullYear(), month = today.getMonth();
  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = first.toLocaleString('en',{month:'long', year:'numeric'});
  const events = {};
  allAssignmentsFlat().forEach(a=>{
    const d = new Date(a.due+'T00:00:00');
    if(d.getFullYear()===year && d.getMonth()===month){
      const key = d.getDate();
      events[key] = events[key]||[];
      events[key].push(a);
    }
  });
  let cells = '';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const isToday = day===today.getDate();
    const evs = events[day]||[];
    cells += `<div class="cal-cell ${isToday?'today':''}">
      <div class="cd-num">${day}</div>
      ${evs.slice(0,3).map(e=>`<div class="cal-ev" style="border-left-color:${e.color}" title="${e.title}">${e.title}</div>`).join('')}
    </div>`;
  }
  return `
    <div class="page-head">
      <div class="eyebrow">${monthName}</div>
      <h1>Calendar</h1>
      <p>All assignment due dates across your classes.</p>
    </div>
    <div class="cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
  `;
}

      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close>Cancel</button>
        <button class="btn btn-primary" data-save="newClass">Create class</button>
      </div>
    `;
  }
  if(type==='newAssignment'){
    body.innerHTML = `
      <div class="modal-head"><h3>Create assignment</h3><button class="modal-close" data-close>&times;</button></div>
      <div class="modal-body">
        <div class="field"><label>Title</label><input id="mTitle" type="text" placeholder="e.g. Essay Draft" /></div>
        <div class="field"><label>Class</label>
          <select id="mClass">${db.classes.map(c=>`<option value="${c.id}" ${preset===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
        </div>
        <div class="row-2">
          <div class="field"><label>Due date</label><input id="mDue" type="date" value="${state.todayISO}" /></div>
          <div class="field"><label>Points</label><input id="mPoints" type="number" value="100" min="0" /></div>
        </div>
        <div class="field"><label>Instructions</label><textarea id="mDesc" placeholder="Assignment details for students..."></textarea></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close>Cancel</button>
        <button class="btn btn-primary" data-save="newAssignment">Assign</button>
      </div>
    `;
  }
  if(type==='newStudent'){
    body.innerHTML = `
      <div class="modal-head"><h3>Add student</h3><button class="modal-close" data-close>&times;</button></div>
      <div class="modal-body">
        <div class="field"><label>Full name</label><input id="mStudentName" type="text" placeholder="e.g. Jordan Lee" /></div>
        <div class="field"><label>Class</label>
          <select id="mStudentClass">${db.classes.map(c=>`<option value="${c.id}" ${preset===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" data-close>Cancel</button>
        <button class="btn btn-primary" data-save="newStudent">Add student</button>
      </div>
    `;
  }
  overlay.classList.add('show');
  overlay.dataset.selectedColor = COLORS[0];
}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }

/* ---------------- Events ---------------- */
function bindGlobalEvents(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.view = el.dataset.nav; render(); });
  });
  document.querySelectorAll('[data-open-class]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.view='class'; state.activeClassId = el.dataset.openClass; state.classTab='stream'; render();
    });
  });
  document.querySelectorAll('[data-classtab]').forEach(el=>{
    el.addEventListener('click', ()=>{ state.classTab = el.dataset.classtab; render(); });
  });
  document.querySelectorAll('[data-modal]').forEach(el=>{
    el.addEventListener('click', ()=> openModal(el.dataset.modal, el.dataset.presetClass));
  });
  document.querySelectorAll('[data-signout]').forEach(el=>{
    el.addEventListener('click', signOut);
  });
  document.querySelectorAll('[data-post-announcement]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const cid = el.dataset.postAnnouncement;
      const input = document.getElementById('streamInput');
      const text = input.value.trim();
      if(!text) return;
      const c = getClass(cid);
      c.stream.unshift({id:uid('p'), author: state.user?.name || 'You', time:'Just now', text});
      render();
      scheduleSave();
    });
  });
  document.querySelectorAll('[data-grade-cell]').forEach(el=>{
    el.addEventListener('change', ()=>{
      const c = getClass(el.dataset.class);
      const sid = el.dataset.student, aid = el.dataset.assignment;
      c.grades[sid] = c.grades[sid] || {};
      const val = el.value === '' ? null : Number(el.value);
      if(val===null) delete c.grades[sid][aid]; else c.grades[sid][aid] = val;
      render();
      scheduleSave();
    });
  });

  // overlay-level handlers (attached once effectively, safe to rebind)
  const overlay = document.getElementById('overlay');
  overlay.onclick = (e)=>{ if(e.target===overlay) closeModal(); };
  overlay.querySelectorAll?.('[data-close]');
}

// Delegated events for modal (since modal content re-renders independently)
document.addEventListener('click', (e)=>{
  if(e.target.matches('[data-close]')) closeModal();

  if(e.target.matches('[data-swatch]')){
    document.querySelectorAll('.swatch-opt').forEach(s=>s.classList.remove('sel'));
    e.target.classList.add('sel');
    document.getElementById('overlay').dataset.selectedColor = e.target.dataset.swatch;
  }

  if(e.target.matches('[data-save="newClass"]')){
    const name = document.getElementById('mClassName').value.trim();
    if(!name) return;
    const section = document.getElementById('mSection').value.trim() || 'Section 1';
    const room = document.getElementById('mRoom').value.trim() || 'TBD';
    const color = document.getElementById('overlay').dataset.selectedColor || COLORS[0];
    const newC = {id:uid('c'), name, section, room, color, students:[], assignments:[], grades:{}, stream:[]};
    db.classes.push(newC);
    closeModal();
    state.view='class'; state.activeClassId = newC.id; state.classTab='stream';
    render();
    scheduleSave();
  }

  if(e.target.matches('[data-save="newAssignment"]')){
    const title = document.getElementById('mTitle').value.trim();
    const cid = document.getElementById('mClass').value;
    const due = document.getElementById('mDue').value || state.todayISO;
    const points = Number(document.getElementById('mPoints').value) || 100;
    const desc = document.getElementById('mDesc').value.trim();
    if(!title || !cid) return;
    const c = getClass(cid);
    c.assignments.push({id:uid('a'), title, due, points, desc});
    closeModal();
    render();
    scheduleSave();
  }

  if(e.target.matches('[data-save="newStudent"]')){
    const name = document.getElementById('mStudentName').value.trim();
    const cid = document.getElementById('mStudentClass').value;
    if(!name || !cid) return;
    const c = getClass(cid);
    c.students.push({id:uid('s'), name});
    closeModal();
    render();
    scheduleSave();
  }
});

/* ---------------- Init ----------------
   Rendering starts only after a successful Google sign-in
   (see handleCredentialResponse), so nothing is called here. */
</script>
